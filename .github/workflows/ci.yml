name: CI Build & Test

on:
  push:
    branches: [ build, test ]
  pull_request:
    branches: [ build, test ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows (VS2022 x64)
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v6

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Check DirectX SDK
        id: dxsdk
        uses: actions/cache@v5
        with:
          key: dxsdk
          path: DXSDK

      - name: Download DirectX SDK
        if: steps.dxsdk.outputs.cache-hit != 'true'
        id: dxsdk-download
        uses: mercury233/action-cache-download-file@v1.1.0
        with:
          url: https://download.microsoft.com/download/a/e/7/ae743f1f-632b-4809-87a9-aa1bb3458e31/DXSDK_Jun10.exe

      - name: Install DirectX SDK
        if: steps.dxsdk.outputs.cache-hit != 'true'
        run: |
          7z x ${{ steps.dxsdk-download.outputs.filepath }} -aoa

      - name: Set DirectX SDK environment variable
        run: |
          $dxsdkPath = Resolve-Path 'DXSDK'
          "DXSDK_DIR=$($dxsdkPath.ProviderPath)\" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build Irrlicht DLL
        run: msbuild source\Irrlicht\Irrlicht17.0.sln /p:Configuration=Release /p:Platform=x64 /m

      - name: Build Examples
        run: msbuild examples\BuildAllExamples_vc17.sln /p:Configuration=Release /p:Platform=x64 /m

      - name: Build Tests
        run: msbuild tests\tests_vc17.sln /p:Configuration=Release /p:Platform=x64 /m

      - name: Run Tests
        timeout-minutes: 2
        working-directory: tests
        run: |
          New-Item -ItemType Directory -Force -Path results
          ..\bin\Win64-VisualStudio\tests.exe
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-windows
          path: |
            tests/tests.log
            tests/results/
          if-no-files-found: ignore

      - name: Pack build artifacts
        if: always()
        run: |
          7z a -ms=on build-windows-x64.7z bin/Win64-VisualStudio/ lib/Win64-visualStudio/
      
      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: build-windows-x64
          path: build-windows-x64.7z
          archive: false

  build-ubuntu:
    name: Ubuntu 24.04
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl-dev libxxf86vm-dev libx11-dev libxext-dev libxcursor-dev xvfb gdb

      - name: Build Irrlicht static library
        run: make -C source/Irrlicht -j$(nproc) NDEBUG=1

      - name: Build Examples
        run: make -C examples

      - name: Build Tests
        run: make -C tests all_linux

      - name: Run Tests
        working-directory: tests
        run: |
          mkdir -p results
          ulimit -c unlimited
          echo "$PWD/core.%e.%p" | sudo tee /proc/sys/kernel/core_pattern
          export XMODIFIERS=""
          xvfb-run ../bin/Linux/tests 2>&1 || true
          for corefile in core.*; do
            if [ -f "$corefile" ]; then
              echo "::group::Backtrace from core dump"
              gdb -batch -ex "thread apply all bt full" ../bin/Linux/tests "$corefile" 2>&1 || true
              echo "::endgroup::"
            fi
          done
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-ubuntu
          path: |
            tests/tests.log
            tests/results/
          if-no-files-found: ignore

      - name: Pack build artifacts
        if: always()
        run: |
          7z a -ms=on build-ubuntu.7z bin/Linux/ lib/Linux/
      
      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: build-ubuntu
          path: build-ubuntu.7z
          archive: false

  build-macos:
    name: macOS 15 (ARM)
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v6

      - name: Build Irrlicht static library
        run: |
          xcodebuild -project source/Irrlicht/Irrlicht.xcodeproj \
            -scheme Irrlicht_OSX \
            -configuration Release \
            build

      - name: Build Examples
        continue-on-error: true
        run: |
          mkdir -p bin/OSX
          for proj in examples/*/*.xcodeproj; do
            [ -d "$proj" ] || continue
            scheme_file=$(ls "$proj"/xcshareddata/xcschemes/*.xcscheme 2>/dev/null | head -1)
            [ -n "$scheme_file" ] || continue
            scheme=$(basename "$scheme_file" .xcscheme)
            name=$(basename "$(dirname "$proj")")
            echo "::group::Building $name"
            xcodebuild -project "$proj" -scheme "$scheme" -configuration Release build \
              OTHER_LDFLAGS="-framework Carbon -framework OpenGL -framework Cocoa -framework IOKit" 2>&1 || \
              echo "::warning::$name failed to build"
            echo "::endgroup::"
          done

      - name: Build Tests
        run: |
          mkdir -p bin/MacOSX
          c++ -std=c++14 -Iinclude -Wall -O3 -fno-exceptions -DGL_SILENCE_DEPRECATION \
            tests/*.cpp -o bin/MacOSX/tests \
            -Llib/OSX -lIrrlicht \
            -framework OpenGL -framework Cocoa -framework IOKit -framework Carbon

      - name: Run Tests
        working-directory: tests
        run: |
          mkdir -p results
          ../bin/MacOSX/tests
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-macos
          path: |
            tests/tests.log
            tests/results/
          if-no-files-found: ignore

      - name: Install new 7-Zip from homebrew
        if: always()
        run: |
          brew install sevenzip

      - name: Pack build artifacts
        if: always()
        run: |
          7zz a -ms=on build-macos.7z bin/OSX/ bin/MacOSX/ lib/OSX/
      
      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: build-macos
          path: build-macos.7z
          archive: false

  build-macos-intel:
    name: macOS 15 (Intel x86_64)
    runs-on: macos-15-intel

    steps:
      - uses: actions/checkout@v6

      - name: Build Irrlicht static library
        run: |
          xcodebuild -project source/Irrlicht/Irrlicht.xcodeproj \
            -scheme Irrlicht_OSX \
            -configuration Release \
            build

      - name: Build Examples
        continue-on-error: true
        run: |
          mkdir -p bin/OSX
          for proj in examples/*/*.xcodeproj; do
            [ -d "$proj" ] || continue
            scheme_file=$(ls "$proj"/xcshareddata/xcschemes/*.xcscheme 2>/dev/null | head -1)
            [ -n "$scheme_file" ] || continue
            scheme=$(basename "$scheme_file" .xcscheme)
            name=$(basename "$(dirname "$proj")")
            echo "::group::Building $name"
            xcodebuild -project "$proj" -scheme "$scheme" -configuration Release build \
              OTHER_LDFLAGS="-framework Carbon -framework OpenGL -framework Cocoa -framework IOKit" 2>&1 || \
              echo "::warning::$name failed to build"
            echo "::endgroup::"
          done

      - name: Build Tests
        run: |
          mkdir -p bin/MacOSX
          c++ -std=c++14 -Iinclude -Wall -O3 -fno-exceptions \
            tests/*.cpp -o bin/MacOSX/tests \
            -Llib/OSX -lIrrlicht \
            -framework OpenGL -framework Cocoa -framework IOKit -framework Carbon

      - name: Run Tests
        working-directory: tests
        run: |
          mkdir -p results
          ../bin/MacOSX/tests
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-macos-intel
          path: |
            tests/tests.log
            tests/results/
          if-no-files-found: ignore

      - name: Install new 7-Zip from homebrew
        if: always()
        run: |
          brew install sevenzip

      - name: Pack build artifacts
        if: always()
        run: |
          7zz a -ms=on build-macos-intel.7z bin/OSX/ bin/MacOSX/ lib/OSX/
      
      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: build-macos-intel
          path: build-macos-intel.7z
          archive: false
